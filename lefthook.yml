pre-commit:
  parallel: true
  commands:
    prettier:
      glob: '*.{ts,tsx,js,jsx,json,md,yaml,yml,css}'
      run: pnpm exec prettier --write {staged_files} && git add {staged_files}
    prisma-format:
      glob: '*.prisma'
      run: pnpm -w db:format && git add {staged_files}

pre-push:
  commands:
    typecheck:
      run: npx nx affected -t typecheck --base=origin/main
