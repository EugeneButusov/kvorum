name: kvorum

services:
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    volumes:
      # postgres 18+ requires the mount at /var/lib/postgresql (not /data);
      # it places data in a versioned subdirectory (e.g. 18/main).
      - postgres_data:/var/lib/postgresql
    healthcheck:
      # CMD-SHELL required — CMD array form does not shell-expand $VAR; $$ escapes
      # Compose interpolation so the in-container shell sees $POSTGRES_USER.
      test: ['CMD-SHELL', 'pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB']
      interval: 5s
      timeout: 3s
      retries: 10
    mem_limit: 2g
    cpus: 2.0
    restart: unless-stopped

  redis:
    image: redis:8-alpine
    ports:
      - '${REDIS_PORT:-6379}:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10
    mem_limit: 512m
    cpus: 0.5
    restart: unless-stopped

  anvil:
    # Pinned to immutable digest (2026-05-09, verified arm64+amd64).
    # To upgrade: run `docker pull ghcr.io/foundry-rs/foundry:nightly-<tag>`,
    # note the new sha256 digest, and update here + in .github/workflows/ci.yml.
    # cast is on PATH in this image.
    image: ghcr.io/foundry-rs/foundry@sha256:043752653d5be351c71709091b3db97c4421c907eb40ea294195e7f532aadf46
    entrypoint: ['anvil']
    command: ['--host', '0.0.0.0']
    ports:
      - '${ANVIL_PORT:-8545}:8545'
    healthcheck:
      # cast block-number probes the JSON-RPC; no shell expansion needed (CMD form).
      test: ['CMD', 'cast', 'block-number', '--rpc-url', 'http://localhost:8545']
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 45s
    mem_limit: 1g
    cpus: 1.0
    restart: unless-stopped

  clickhouse:
    image: clickhouse/clickhouse-server:24
    environment:
      CLICKHOUSE_DB: ${CLICKHOUSE_DATABASE:-default}
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-default}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-}
      # Cap memory so CI runners (~7 GB available) don't OOM.
      MAX_SERVER_MEMORY_USAGE: '2147483648'
    ports:
      - '${CLICKHOUSE_PORT:-8123}:8123'
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    healthcheck:
      test:
        ['CMD-SHELL', 'wget --no-verbose --tries=1 --spider http://localhost:8123/ping || exit 1']
      interval: 5s
      timeout: 3s
      retries: 10
    mem_limit: 2g
    cpus: 2.0
    restart: unless-stopped

  # Application services (api, dashboard, indexer, ai-worker) land in M1.
  # When added they MUST include:
  #   depends_on:
  #     postgres:
  #       condition: service_healthy
  #     clickhouse:
  #       condition: service_healthy  (for services that write to ClickHouse)
  #
  # Container hardening (read_only, cap_drop, security_opt, logging caps,
  # backup automation, metrics scraping) is deferred to M7.

volumes:
  postgres_data:
  redis_data:
  clickhouse_data:
