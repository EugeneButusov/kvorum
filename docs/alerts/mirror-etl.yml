groups:
  - name: mirror_etl
    rules:
      - alert: MirrorEtlExactMatchFalse
        expr: indexer_mirror_etl_exact_match == 0
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: 'Mirror ETL {{ $labels.job }} reports exact_match=0'
          runbook: 'docs/runbooks/m2-mirror-etl.md#alert-response-exact_match--false'
      - alert: MirrorEtlStale
        expr: indexer_mirror_etl_last_success_age_seconds > 36 * 3600
        for: 10m
        labels:
          severity: critical
        annotations:
          summary: 'Mirror ETL {{ $labels.job }} last success > 36h ago'
          runbook: 'docs/runbooks/m2-mirror-etl.md#alert-response-last_success_age_seconds--36h'
