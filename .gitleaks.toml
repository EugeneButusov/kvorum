title = "Kvorum gitleaks config"

[extend]
useDefault = true

[[allowlists]]
description = "Planning docs and SPEC — intentional placeholder patterns"
regexTarget = "line"
regexes = [
  '''REPLACE_BEFORE_DEPLOY''',
  '''kvorum\.example''',
]

[[allowlists]]
description = "Known-issue registry examples and test fixtures"
regexTarget = "line"
regexes = [
  '''KNOWN-\d{3}''',
]

[[allowlists]]
description = "Ethereum contract/token addresses — false positive on generic-api-key entropy rule"
commits = [
  "bd6e69bf9c818aa1aebff9dd85e65115f317e344",
]
