title = "Kvorum gitleaks config"

[extend]
useDefault = true

[[allowlists]]
description = "Planning docs and SPEC — intentional placeholder patterns"
regexTarget = "line"
regexes = [
  '''REPLACE_BEFORE_DEPLOY''',
  '''kvorum\.example''',
]

[[allowlists]]
description = "Known-issue registry examples and test fixtures"
regexTarget = "line"
regexes = [
  '''KNOWN-\d{3}''',
]

[[allowlists]]
description = "Public COMP token contract address (not a secret)"
regexTarget = "line"
regexes = [
  '''0xc00e94cb662c3520282e6f5717214004a7f26888''',
]
