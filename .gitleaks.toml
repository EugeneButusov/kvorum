title = "Kvorum gitleaks config"

[extend]
useDefault = true

[[allowlists]]
description = "Planning docs and SPEC — intentional placeholder patterns"
regexTarget = "line"
regexes = [
  '''REPLACE_BEFORE_DEPLOY''',
  '''kvorum\.example''',
]

[[allowlists]]
description = "Known-issue registry examples and test fixtures"
regexTarget = "line"
regexes = [
  '''KNOWN-\d{3}''',
]

[[allowlists]]
description = "Public governance token contract addresses (not secrets)"
regexTarget = "line"
regexes = [
  # COMP token (Compound)
  '''0xc00e94cb662c3520282e6f5717214004a7f26888''',
  # AAVE token (Aave) — both lowercase and EIP-55 checksummed forms (gitleaks regex is
  # case-sensitive; the `(?i)` inline flag is not honored by the CI gitleaks version).
  '''0x7fc66500c84a76ad7e9c93437bfc5ac33e2ddae9''',
  '''0x7Fc66500c84A76Ad7e9c93437bFc5Ac33E2DDaE9''',
]
