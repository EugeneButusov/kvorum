# ─────────────────────────────────────────────────────────────────────────────
# EXAMPLE ONLY — DO NOT fill in real values here and DO NOT commit a filled copy.
# This file documents the keys the `kvorum-secrets` Secret must contain. It is NOT
# referenced by any kustomization, so `kubectl apply -k` never creates it.
#
# The real Secret lives ONLY in the cluster and is created out-of-band from your
# password manager, e.g.:
#
#   kubectl -n kvorum create secret generic kvorum-secrets \
#     --from-literal=DATABASE_URL='postgresql://...' \
#     --from-literal=CLICKHOUSE_URL='https://<elestio-host>:8443' \
#     --from-literal=CLICKHOUSE_USER='...' \
#     --from-literal=CLICKHOUSE_PASSWORD='...' \
#     --from-literal=CLICKHOUSE_DATABASE='kvorum' \
#     --from-literal=REDIS_URL='rediss://...upstash.io:6379' \
#     --from-literal=CURSOR_SECRET='...' \
#     --from-literal=HMAC_PEPPER_CURRENT='...' \
#     --from-literal=CHAIN_CONFIG='{"chains":[...]}' \
#     --from-literal=SNAPSHOT_API_KEY='...' \
#     --from-literal=ETHERSCAN_API_KEY='...' \
#     --from-literal=TUNNEL_TOKEN='...'
#
# Rotate with `kubectl create secret ... --dry-run=client -o yaml | kubectl apply -f -`
# then restart the workloads: kubectl -n kvorum rollout restart deploy/kvorum-api deploy/kvorum-indexer
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: kvorum-secrets
  namespace: kvorum
type: Opaque
stringData:
  # ── External datastores (managed / third-party) ──
  DATABASE_URL: 'postgresql://USER:PASSWORD@HOST:25060/kvorum?sslmode=require' # DO Managed Postgres
  CLICKHOUSE_URL: 'https://HOST:8443' # Elestio managed ClickHouse (HTTPS endpoint)
  CLICKHOUSE_USER: 'REPLACE_ME'
  CLICKHOUSE_PASSWORD: 'REPLACE_ME'
  CLICKHOUSE_DATABASE: 'kvorum'
  REDIS_URL: 'rediss://default:PASSWORD@HOST.upstash.io:6379' # Upstash (TLS)
  # ── App secrets ──
  CURSOR_SECRET: 'REPLACE_ME' # signs pagination cursors; API fails to boot if unset
  HMAC_PEPPER_CURRENT: 'REPLACE_ME' # base64 32 bytes: openssl rand -base64 32
  # HMAC_PEPPER_PREVIOUS: ""        # optional grace-window pepper during rotation
  CHAIN_CONFIG: '{"chains":[]}' # ADR-028 chain/provider JSON; holds RPC API keys
  SNAPSHOT_API_KEY: 'REPLACE_ME'
  ETHERSCAN_API_KEY: 'REPLACE_ME'
  # ── Ingress ──
  TUNNEL_TOKEN: 'REPLACE_ME' # Cloudflare Tunnel connector token
