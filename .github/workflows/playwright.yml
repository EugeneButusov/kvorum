name: Smoke (Playwright)

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: playwright-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read

jobs:
  smoke:
    name: Smoke (dashboard)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.0.8

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.pnpm-store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browser
        run: pnpm --filter dashboard exec playwright install --with-deps chromium

      # Primary-flow smoke tests (§10.9). The Playwright config builds + starts the dashboard; with no
      # backend in this job the pages render their graceful shells, so the suite asserts routing,
      # auth-gating, and the error pages — not live data.
      - name: Run smoke tests
        run: pnpm --filter dashboard test:smoke
