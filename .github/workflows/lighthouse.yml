name: Lighthouse

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: lighthouse-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read

jobs:
  lighthouse:
    name: Lighthouse (dashboard)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.0.8

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.pnpm-store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build dashboard
        run: pnpm --filter dashboard build

      # Baseline harness: asserts the §7.2 / §10.9 budgets as warnings for now (the
      # interim pages are placeholders). A later milestone tightens these to a blocking
      # gate on the proposal-detail + homepage once those pages are real.
      - name: Run Lighthouse CI
        run: pnpm exec lhci autorun
        working-directory: apps/dashboard
