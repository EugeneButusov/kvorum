name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read
  actions: read
  pull-requests: read

jobs:
  # Single sequential job: each step pays ~20–30 s for checkout+install.
  # Splitting into parallel jobs would repeat that overhead N times and make total
  # wall-clock time longer at current repo size. Revisit when any individual step
  # consistently exceeds ~3 min — that's the crossover where parallelism wins.
  ci:
    name: Lint · Typecheck · Test · Build · Audit · Scan
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.0.8

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.pnpm-store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Start Anvil
        run: |
          anvil --silent &
          echo "ANVIL_PID=$!" >> "$GITHUB_ENV"

      - name: Wait for Anvil
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8545 \
              -X POST -H "Content-Type: application/json" \
              --data '{"jsonrpc":"2.0","method":"eth_chainId","params":[],"id":1}' \
              > /dev/null; then
              echo "anvil ready after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "anvil never came up after 30s" >&2
          exit 1

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Format check
        run: pnpm -w format:check

      - name: Lint
        run: pnpm -w lint

      - name: Typecheck
        run: pnpm -w typecheck

      - name: Test
        run: pnpm -w test
        env:
          ANVIL_RPC_URL: http://localhost:8545

      - name: Stop Anvil
        if: always() && env.ANVIL_PID != ''
        run: kill "$ANVIL_PID" || true

      - name: Build
        run: pnpm -w build

      - name: Test kvorum-admin bundle
        run: pnpm -w test:bundle

      - name: Dependency audit
        run: pnpm audit --audit-level=high --prod

      - name: Secret scan (gitleaks)
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

      - name: Validate Caddyfile
        uses: docker://caddy:2-alpine
        with:
          args: caddy validate --config infra/caddy/Caddyfile
