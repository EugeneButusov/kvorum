packages:
  - 'apps/*'
  - 'libs/*'
  - 'libs/sources/*'
  - 'nest/chain'
  - 'nest/logging'
  - 'nest/observability'
  - 'nest/sources/*'
allowBuilds:
  '@nestjs/core': true
  '@parcel/watcher': true
  '@scarf/scarf': false
  '@swc/core': true
  esbuild: true
  lefthook: true
  less: true
  sharp: true
  unrs-resolver: true
