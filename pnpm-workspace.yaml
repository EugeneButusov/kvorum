packages:
  - 'apps/*'
  - 'libs/*'
  - 'libs/sources/*'
  - 'nest/actors'
  - 'nest/analytics'
  - 'nest/auth'
  - 'nest/chain'
  - 'nest/daos'
  - 'nest/db'
  - 'nest/delegations'
  - 'nest/logging'
  - 'nest/observability'
  - 'nest/proposals'
  - 'nest/sources/*'
  - 'nest/votes'
  - 'tests/e2e'
overrides:
  # pnpm 11 reads overrides from here, not package.json#pnpm.overrides.
  # ws: ethers pins 8.17.1 (vulnerable, GHSA-96hv-2xvq-fx4p); pin to the patched line.
  'next>postcss': '8.5.10'
  'ws': '8.21.0'
  # multer: @nestjs/platform-express pulls 1.x (vulnerable, GHSA-72gw-mp4g-v24j);
  # 2.2.0 is API-compatible for our usage (read API uses no file uploads).
  'multer': '^2.2.0'
  'express>qs': '6.15.2'
  'body-parser>qs': '6.15.2'
  'superagent>qs': '6.15.2'
  # js-yaml: @nestjs/swagger pulls 4.1.1 and dev tooling 4.2.0 (both vulnerable,
  # GHSA-52cp-r559-cp3m — YAML merge-key chains force quadratic CPU). Rewrite exactly the
  # vulnerable range to the patched 4.x release; a 3.x/5.x consumer, if one appears, is untouched.
  'js-yaml@>=4.0.0 <4.3.0': '4.3.0'
  # sharp: next pulls 0.34.5 (vulnerable via bundled libvips, GHSA-f88m-g3jw-g9cj —
  # CVE-2026-33327/33328/35590/35591). Rewrite the vulnerable range to the patched 0.35.x line
  # (same major, next's image-optimization API is unaffected).
  'sharp@<0.35.0': '0.35.3'
allowBuilds:
  '@nestjs/core': true
  '@parcel/watcher': true
  '@scarf/scarf': false
  '@swc/core': true
  esbuild: true
  lefthook: true
  less: true
  sharp: true
  unrs-resolver: true
